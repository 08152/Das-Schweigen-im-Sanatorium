<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite FPS World</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#4aa3ff;
}

canvas{
    display:block;
}

#overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.5);
    color:white;
    font-family:Arial,sans-serif;
    font-size:28px;
    cursor:pointer;
    z-index:10;
}

#hud{
    position:absolute;
    top:10px;
    right:10px;
    color:white;
    font-family:Arial;
    background:rgba(0,0,0,.35);
    padding:10px;
    border-radius:8px;
    z-index:5;
}
</style>

</head>
<body>

<div id="overlay">Klicken zum Start</div>

<div id="hud">
X: 0<br>
Y: 0<br>
Z: 0
</div>

<script type="module" src="./main.js"></script>

</body>
</html>
