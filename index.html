<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Infinite FPS World</title>

<style>

body{
margin:0;
overflow:hidden;
}

#hud{
position:absolute;
top:20px;
right:20px;
color:white;
font-family:Arial;
font-size:18px;
}

</style>

</head>


<body>


<div id="hud"></div>



<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/controls/PointerLockControls.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/loaders/GLTFLoader.js"></script>



<script>


// Szene

const scene =
new THREE.Scene();


scene.background =
new THREE.Color(0x87ceeb);



// Kamera

const camera =
new THREE.PerspectiveCamera(
75,
innerWidth/innerHeight,
0.1,
2000
);



// Renderer

const renderer =
new THREE.WebGLRenderer({
antialias:true
});


renderer.setSize(
innerWidth,
innerHeight
);


renderer.shadowMap.enabled=true;


document.body.appendChild(
renderer.domElement
);



// Licht

const sun =
new THREE.DirectionalLight(
0xffffff,
5
);


sun.position.set(
50,
100,
20
);


sun.castShadow=true;


scene.add(sun);



scene.add(
new THREE.AmbientLight(
0xffffff,
2
)
);



// FPS

const controls =
new THREE.PointerLockControls(
camera,
document.body
);


document.body.onclick=()=>{

controls.lock();

};


scene.add(
controls.getObject()
);



camera.position.y=8;





// =================
// Terrain Chunks
// =================


const size=100;


let chunks={};



function terrainHeight(x,z){

return (

Math.sin(x*0.05)*4+

Math.cos(z*0.04)*4

);

}





function createChunk(cx,cz){



let geo =
new THREE.PlaneGeometry(
size,
size,
40,
40
);



geo.rotateX(
-Math.PI/2
);



let p =
geo.attributes.position;



for(
let i=0;i<p.count;i++
){


let x =
p.getX(i)+cx*size;


let z =
p.getZ(i)+cz*size;



p.setY(
i,
terrainHeight(x,z)
);


}



geo.computeVertexNormals();



let mat =
new THREE.MeshStandardMaterial({

color:0x4b8b35

});



let mesh =
new THREE.Mesh(
geo,
mat
);



mesh.position.set(
cx*size,
0,
cz*size
);



scene.add(mesh);



chunks[cx+"_"+cz]=mesh;



}





function updateChunks(){



let cx =
Math.floor(
camera.position.x/size
);


let cz =
Math.floor(
camera.position.z/size
);



for(
let x=-2;x<=2;x++
){

for(
let z=-2;z<=2;z++
){


let id =
(cx+x)+"_"+(cz+z);



if(!chunks[id]){

createChunk(
cx+x,
cz+z
);

}


}

}


}






// =================
// Baum nur einmal laden
// =================


let tree=null;



const loader =
new THREE.GLTFLoader();



loader.load(
"baum.glb",

g=>{


tree=g.scene;


tree.traverse(
o=>{

if(o.isMesh)
o.castShadow=true;

});


console.log(
"Baum geladen"
);


}

);






function spawnTree(x,z){


if(!tree)return;



let t =
tree.clone();



t.position.set(
x,
terrainHeight(x,z),
z
);



scene.add(t);



}




// =================
// Bewegung
// =================


let keys={};



onkeydown=e=>
keys[e.code]=true;


onkeyup=e=>
keys[e.code]=false;



function move(){



let speed=0.3;



if(keys.W)
controls.moveForward(speed);


if(keys.S)
controls.moveForward(-speed);


if(keys.A)
controls.moveRight(-speed);


if(keys.D)
controls.moveRight(speed);



}





// Loop


function animate(){


requestAnimationFrame(
animate
);



updateChunks();


move();



document.getElementById("hud").innerHTML=

`
X: ${camera.position.x.toFixed(0)}
<br>
Y: ${camera.position.y.toFixed(0)}
<br>
Z: ${camera.position.z.toFixed(0)}
`;



renderer.render(
scene,
camera
);



}


animate();





window.onresize=()=>{

camera.aspect=
innerWidth/innerHeight;


camera.updateProjectionMatrix();


renderer.setSize(
innerWidth,
innerHeight
);


};



</script>


</body>
</html>
