<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Infinite Chunk FPS World</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#overlay {
    position:absolute;
    width:100%; height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.6);
    color:white;
    font-family:Arial;
    font-size:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay">Klicken zum Start (Pointer Lock)</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

let scene, camera, renderer;
let move = { forward:false, back:false, left:false, right:false };

let chunks = {};
const CHUNK_SIZE = 50;
const RENDER_DISTANCE = 3; // wie viele chunks um dich herum

init();
animate();

function init(){

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87c95c); // grüner Himmel

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
    camera.position.set(0, 5, 0);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

    // Pointer Lock
    const overlay = document.getElementById("overlay");
    overlay.onclick = () => document.body.requestPointerLock();

    document.addEventListener("pointerlockchange", ()=>{
        overlay.style.display = document.pointerLockElement ? "none" : "flex";
    });

    // Maus Look
    let pitch = 0;
    let yaw = 0;

    document.addEventListener("mousemove",(e)=>{
        if(!document.pointerLockElement) return;

        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;

        pitch = Math.max(-1.5, Math.min(1.5, pitch));

        camera.rotation.x = pitch;
        camera.rotation.y = yaw;
    });

    // WASD
    document.addEventListener("keydown",(e)=>{
        if(e.code==="KeyW") move.forward=true;
        if(e.code==="KeyS") move.back=true;
        if(e.code==="KeyA") move.left=true;
        if(e.code==="KeyD") move.right=true;
    });

    document.addEventListener("keyup",(e)=>{
        if(e.code==="KeyW") move.forward=false;
        if(e.code==="KeyS") move.back=false;
        if(e.code==="KeyA") move.left=false;
        if(e.code==="KeyD") move.right=false;
    });

    window.addEventListener("resize", ()=>{
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

// ===== CHUNK ERZEUGUNG =====
function createChunk(cx, cz){

    const key = cx + "," + cz;

    if(chunks[key]) return;

    const group = new THREE.Group();

    const geo = new THREE.BoxGeometry(5, 1, 5);

    for(let x=0;x<10;x++){
        for(let z=0;z<10;z++){

            let worldX = cx * CHUNK_SIZE + x * 5;
            let worldZ = cz * CHUNK_SIZE + z * 5;

            const height = Math.sin(worldX * 0.05) * Math.cos(worldZ * 0.05) * 2;

            const mat = new THREE.MeshStandardMaterial({
                color: 0x2ecc71
            });

            const block = new THREE.Mesh(geo, mat);
            block.position.set(worldX, height, worldZ);

            group.add(block);
        }
    }

    scene.add(group);
    chunks[key] = group;
}

// ===== CHUNK UPDATE =====
function updateChunks(){

    const cx = Math.floor(camera.position.x / CHUNK_SIZE);
    const cz = Math.floor(camera.position.z / CHUNK_SIZE);

    for(let x = cx-RENDER_DISTANCE; x <= cx+RENDER_DISTANCE; x++){
        for(let z = cz-RENDER_DISTANCE; z <= cz+RENDER_DISTANCE; z++){
            createChunk(x, z);
        }
    }
}

// ===== LOOP =====
function animate(){
    requestAnimationFrame(animate);

    updateChunks();

    const speed = 0.4;

    let direction = new THREE.Vector3();

    if(move.forward) direction.z -= 1;
    if(move.back) direction.z += 1;
    if(move.left) direction.x -= 1;
    if(move.right) direction.x += 1;

    direction.normalize();

    let forward = new THREE.Vector3();
    camera.getWorldDirection(forward);
    forward.y = 0;
    forward.normalize();

    let right = new THREE.Vector3();
    right.crossVectors(camera.up, forward).normalize();

    let moveVec = new THREE.Vector3();
    moveVec.addScaledVector(forward, -direction.z);
    moveVec.addScaledVector(right, direction.x);
    moveVec.multiplyScalar(speed);

    camera.position.add(moveVec);

    renderer.render(scene, camera);
}
</script>

</body>
</html>
