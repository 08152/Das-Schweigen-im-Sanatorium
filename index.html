<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infinite FPS World</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

#hud{
position:absolute;
top:15px;
right:20px;
color:white;
font-family:Arial;
font-size:18px;
z-index:5;
}
</style>

</head>

<body>

<div id="hud">
X:0<br>
Y:0<br>
Z:0
</div>


<script type="module">


import * as THREE from 
"https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";


import {GLTFLoader}
from
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js";


import {PointerLockControls}
from
"https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/PointerLockControls.js";



// Szene

const scene =
new THREE.Scene();

scene.background =
new THREE.Color(0x87ceeb);



// Kamera

const camera =
new THREE.PerspectiveCamera(
75,
innerWidth/innerHeight,
0.1,
2000
);



// Renderer

const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
innerWidth,
innerHeight
);

renderer.shadowMap.enabled=true;

document.body.appendChild(
renderer.domElement
);



// Licht

let sun =
new THREE.DirectionalLight(
0xffffff,
2
);

sun.position.set(
100,
150,
50
);

sun.castShadow=true;

scene.add(sun);

scene.add(
new THREE.AmbientLight(
0xffffff,
0.5
)
);




// FPS


const controls =
new PointerLockControls(
camera,
document.body
);


document.body.onclick=()=>{
controls.lock();
};


scene.add(
controls.getObject()
);




// =====================
// TERRAIN SYSTEM
// =====================


const chunkSize=80;

const renderDistance=2;


let chunks={};



function noise(x,z){

return (
Math.sin(x*0.05)
+
Math.cos(z*0.04)
+
Math.sin((x+z)*0.03)
)*8;

}




function createChunk(cx,cz){


let geo =
new THREE.PlaneGeometry(
chunkSize,
chunkSize,
32,
32
);


geo.rotateX(
-Math.PI/2
);



let pos =
geo.attributes.position;



for(
let i=0;
i<pos.count;
i++
){

let x =
pos.getX(i)+cx*chunkSize;


let z =
pos.getZ(i)+cz*chunkSize;


let h =
noise(x,z);


pos.setY(
i,
h
);

}


geo.computeVertexNormals();



let mat =
new THREE.MeshStandardMaterial({

color:0x555c35,
roughness:1

});


let mesh =
new THREE.Mesh(
geo,
mat
);


mesh.receiveShadow=true;


mesh.position.set(
cx*chunkSize,
0,
cz*chunkSize
);



scene.add(mesh);



// Bäume

for(
let i=0;i<6;i++
){

let x =
(cx*chunkSize)
+
(Math.random()-0.5)*chunkSize;


let z =
(cz*chunkSize)
+
(Math.random()-0.5)*chunkSize;


spawnTree(x,z);

}



chunks[cx+"_"+cz]=mesh;


}




function updateChunks(){


let px =
Math.floor(
camera.position.x/chunkSize
);


let pz =
Math.floor(
camera.position.z/chunkSize
);



for(
let x=-renderDistance;
x<=renderDistance;
x++
){

for(
let z=-renderDistance;
z<=renderDistance;
z++
){

let id =
(px+x)+"_"+(pz+z);


if(!chunks[id])
createChunk(
px+x,
pz+z
);


}

}



}



// =====================
// BAUM CACHE
// =====================


let treeModel=null;



const loader =
new GLTFLoader();



loader.load(
"baum.glb",
(gltf)=>{

treeModel =
gltf.scene;


treeModel.traverse(o=>{

if(o.isMesh){

o.castShadow=true;

}

});


console.log(
"Baum geladen einmal"
);

}

);




function spawnTree(x,z){


if(!treeModel)
return;



let tree =
treeModel.clone(true);


let y =
noise(x,z);


tree.position.set(
x,
y,
z
);



let s =
0.8+
Math.random()*0.7;


tree.scale.set(
s,s,s
);



scene.add(tree);


}



// =====================
// Bewegung
// =====================


let keys={};


onkeydown=e=>
keys[e.code]=true;


onkeyup=e=>
keys[e.code]=false;



let velocityY=0;



function movement(){


let speed=0.25;



if(keys.KeyW)
controls.moveForward(speed);


if(keys.KeyS)
controls.moveForward(-speed);


if(keys.KeyA)
controls.moveRight(-speed);


if(keys.KeyD)
controls.moveRight(speed);



velocityY-=0.01;


camera.position.y+=velocityY;



if(camera.position.y<3){

camera.position.y=3;

velocityY=0;

}


if(keys.Space){

velocityY=0.25;

}


}



// Start

camera.position.set(
0,
10,
0
);



// HUD


function hud(){

document.getElementById("hud").innerHTML=

`
X:${camera.position.x.toFixed(1)}<br>
Y:${camera.position.y.toFixed(1)}<br>
Z:${camera.position.z.toFixed(1)}
`;

}



// Loop


function animate(){

requestAnimationFrame(
animate
);


updateChunks();

movement();

hud();


renderer.render(
scene,
camera
);


}

animate();



onresize=()=>{

camera.aspect=
innerWidth/innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
innerWidth,
innerHeight
);

};


</script>

</body>
</html>
