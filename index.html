<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FPS World</title>

<style>
body { margin:0; overflow:hidden; }

#hud{
position:absolute;
top:10px;
right:10px;
color:white;
font-family:Arial;
font-size:14px;
text-align:right;
}
</style>
</head>

<body>

<div id="hud"></div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// LIGHT (FIX: nicht mehr schwarz)
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(100,200,100);
scene.add(sun);

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

// ================= CAMERA =================

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 2000
);
camera.position.y = 10;

// ================= RENDERER =================

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ================= CONTROLS =================

const controls = new THREE.PointerLockControls(camera,document.body);
document.body.onclick = ()=>controls.lock();
scene.add(controls.getObject());

// ================= GRAVITY =================

let velocityY = 0;
let canJump = false;
const gravity = 0.02;

// ================= INPUT =================

let keys={};
onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

// ================= TERRAIN =================

const size = 100;
let chunks = {};

function height(x,z){
return Math.sin(x*0.05)*4 + Math.cos(z*0.05)*4;
}

function createChunk(cx,cz){

const geo = new THREE.PlaneGeometry(size,size,30,30);
geo.rotateX(-Math.PI/2);

const pos = geo.attributes.position;

for(let i=0;i<pos.count;i++){
let x = pos.getX(i)+cx*size;
let z = pos.getZ(i)+cz*size;
pos.setY(i,height(x,z));
}

geo.computeVertexNormals();

const mat = new THREE.MeshStandardMaterial({
color:0x3f8f35,
roughness:1
});

const mesh = new THREE.Mesh(geo,mat);
mesh.receiveShadow = true;
mesh.position.set(cx*size,0,cz*size);

scene.add(mesh);

chunks[cx+"_"+cz]=mesh;

// Bäume verzögert spawn (FIX gegen GLB Lag)
setTimeout(()=>{
for(let i=0;i<6;i++){
spawnTree(
cx*size+(Math.random()-0.5)*size,
cz*size+(Math.random()-0.5)*size
);
}
},200);
}

// ================= CHUNKS =================

function updateChunks(){

const cx = Math.floor(camera.position.x/size);
const cz = Math.floor(camera.position.z/size);

for(let x=-2;x<=2;x++){
for(let z=-2;z<=2;z++){

let id=(cx+x)+"_"+(cz+z);

if(!chunks[id]){
createChunk(cx+x,cz+z);
}

}}
}

// ================= TREE =================

let treeModel = null;

const loader = new THREE.GLTFLoader();

loader.load("baum.glb",g=>{
treeModel = g.scene;

treeModel.traverse(o=>{
if(o.isMesh){
o.castShadow = true;
o.receiveShadow = true;
}
});

console.log("Baum geladen");
});

function spawnTree(x,z){
if(!treeModel) return;

let t = treeModel.clone();
t.position.set(x,height(x,z),z);
t.scale.set(2,2,2);
scene.add(t);
}

// ================= MOVE =================

function move(){

let speed = 0.6;

if(keys.KeyW)controls.moveForward(speed);
if(keys.KeyS)controls.moveForward(-speed);
if(keys.KeyA)controls.moveRight(-speed);
if(keys.KeyD)controls.moveRight(speed);

// Jump
if(keys.Space && canJump){
velocityY = 0.3;
canJump = false;
}

camera.position.y -= velocityY;
velocityY -= gravity;

let ground = height(camera.position.x,camera.position.z) + 8;

if(camera.position.y < ground){
camera.position.y = ground;
velocityY = 0;
canJump = true;
}
}

// ================= HUD =================

function hud(){
document.getElementById("hud").innerHTML=
`X: ${camera.position.x.toFixed(0)}<br>
Y: ${camera.position.y.toFixed(0)}<br>
Z: ${camera.position.z.toFixed(0)}`;
}

// ================= LOOP =================

function animate(){
requestAnimationFrame(animate);

updateChunks();
move();
hud();

renderer.render(scene,camera);
}

animate();

// ================= RESIZE =================

window.onresize=()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
};

</script>

</body>
</html>
